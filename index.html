<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Video Saya</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f0f;
    font-family:Arial, Helvetica, sans-serif;
    color:#fff;
}

header{
    background:#181818;
    padding:18px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    box-shadow:0 2px 10px rgba(0,0,0,.4);
}

.container{
    max-width:900px;
    margin:30px auto;
    padding:15px;
}

.video-card{
    background:#1b1b1b;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.4);
}

video{
    width:100%;
    display:block;
    background:#000;
}

.info{
    padding:20px;
}

.info h2{
    margin-bottom:10px;
}

.info p{
    color:#bdbdbd;
    line-height:1.6;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:14px 28px;
    background:#ff0033;
    color:#fff;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}

.btn:hover{
    background:#ff3366;
}

@media(max-width:768px){
    header{
        font-size:22px;
    }

    .btn{
        width:100%;
        text-align:center;
    }
}
</style>

</head>
<body>

<header>
Website Video Saya
</header>

<div class="container">

<div class="video-card">

<video controls poster="thumbnail.jpg">
<source src="videos/video1.mp4" type="video/mp4">
Browser Anda tidak mendukung video.
</video>

<div class="info">

<h2>Judul Video</h2>

<p>
Silakan tonton video di bawah ini.
</p>

<a class="btn" href="https://omg10.com/4/11155706" target="_blank">
Tonton Video Berikutnya
</a>

</div>

</div>

</div>

</body>
</html>
